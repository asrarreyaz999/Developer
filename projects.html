<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Asrar Reyaz</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        nav { padding: 2rem; }
        nav a { color: #00d4ff; text-decoration: none; margin: 0 15px; font-weight: bold; }

        h1 { margin-top: 50px; font-size: 2.5rem; }

        /* Project Container */
        .projects-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 50px 20px;
            flex-wrap: wrap;
        }

        /* Project Card Styling */
        .card {
            background: #111;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #333;
            width: 300px;
            transition: transform 0.3s, border 0.3s;
        }

        .card:hover {
            transform: translateY(-15px);
            border: 1px solid #00d4ff;
        }

        .card h3 { color: #00d4ff; }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #00d4ff;
            color: #000;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
    </nav>

    <h1>My Projects</h1>

    <div class="projects-container">
        <!-- Project 1 -->
        <div class="card">
            <h3>Reyaz General Store</h3>
            <p>A web platform built for local commerce management.</p>
            <a href="https://reyazgeneralstore.vercel.app" class="btn" target="_blank">View Project</a>
        </div>

        <!-- Project 2 -->
        <div class="card">
            <h3>The Ayaan Gamer</h3>
            <p>An interactive gaming community and portfolio site.</p>
            <a href="https://theayaangamer.netlify.app" class="btn" target="_blank">View Project</a>
        </div>
    </div>

</body>
